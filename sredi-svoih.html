<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #060810;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .phone-shell {
    width: 393px;
    height: 852px;
    background: #0d0f18;
    border-radius: 54px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12),
      0 0 0 3px #1a1c28,
      0 0 0 4px rgba(255,255,255,0.06),
      0 40px 100px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.1);
  }

  /* Dynamic island */
  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }

  /* Status bar */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 59px;
    display: flex;
    align-items: flex-end;
    padding: 0 28px 8px;
    justify-content: space-between;
    z-index: 90;
    pointer-events: none;
  }
  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-icons svg { fill: #fff; }

  /* Screen container */
  .screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .screen-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-top: 59px;
    padding-bottom: 90px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .screen-scroll::-webkit-scrollbar { display: none; }

  /* Tab bar */
  .tab-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 90px;
    background: rgba(13,15,24,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: flex-start;
    padding-top: 10px;
    z-index: 80;
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: opacity 0.15s;
    padding: 0 4px;
  }
  .tab-item:active { opacity: 0.7; }
  .tab-icon {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tab-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1px;
  }

  /* Glass card */
  .glass-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 18px;
    overflow: hidden;
  }
  .glass-card-hover {
    transition: background 0.15s;
  }
  .glass-card-hover:active {
    background: rgba(255,255,255,0.08);
  }

  /* Orange button */
  .btn-orange {
    background: linear-gradient(135deg, #F07A2A, #E05A10);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(240,122,42,0.35);
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-orange:active { opacity: 0.85; transform: scale(0.97); }

  /* Segment control */
  .seg-control {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    display: flex;
    padding: 3px;
    gap: 2px;
  }
  .seg-item {
    flex: 1;
    padding: 7px 12px;
    border-radius: 9px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .seg-item.active {
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-weight: 600;
  }

  /* Tag pill */
  .tag-pill {
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 600;
    display: inline-block;
  }

  /* Progress bar */
  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #F07A2A, #E05A10);
  }

  /* Separator */
  .sep {
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 0 16px;
  }

  /* Page transition */
  .page-enter { animation: fadeSlideIn 0.25s ease forwards; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

/* toggle component */
const Toggle = ({value, onChange}) => (
  <div onClick={()=>onChange(!value)} style={{
    width:48,height:28,borderRadius:14,
    background: value ? 'linear-gradient(135deg,#F07A2A,#E05A10)' : 'rgba(255,255,255,0.12)',
    border: value ? 'none' : '1px solid rgba(255,255,255,0.15)',
    position:'relative',cursor:'pointer',flexShrink:0,
    transition:'background 0.2s',
    boxShadow: value ? '0 2px 8px rgba(240,122,42,0.4)' : 'none'
  }}>
    <div style={{
      position:'absolute',top:3,
      left: value ? 23 : 3,
      width:22,height:22,borderRadius:'50%',
      background:'#fff',
      transition:'left 0.2s',
      boxShadow:'0 1px 4px rgba(0,0,0,0.3)'
    }}/>
  </div>
);

/* settings row */
const SettingRow = ({icon, label, value, onPress, danger, toggle, toggleVal, onToggle, last}) => (
  <div>
    <div onClick={onPress} style={{
      display:'flex',alignItems:'center',padding:'14px 16px',gap:14,
      cursor: onPress ? 'pointer' : 'default',
      transition:'background 0.15s',
    }}
    onMouseEnter={e=>{ if(onPress) e.currentTarget.style.background='rgba(255,255,255,0.04)'; }}
    onMouseLeave={e=>{ e.currentTarget.style.background='transparent'; }}
    >
      {icon && <div style={{
        width:34,height:34,borderRadius:9,flexShrink:0,
        background:'rgba(255,255,255,0.07)',
        border:'1px solid rgba(255,255,255,0.08)',
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:16
      }}>{icon}</div>}
      <div style={{flex:1}}>
        <div style={{fontSize:15,fontWeight:500,color: danger ? '#ff5555' : '#fff'}}>{label}</div>
        {value && <div style={{fontSize:12,color:'rgba(255,255,255,0.35)',marginTop:2}}>{value}</div>}
      </div>
      {toggle ? <Toggle value={toggleVal} onChange={onToggle}/> :
        onPress ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M9 18l6-6-6-6" stroke="rgba(255,255,255,0.3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg> : null
      }
    </div>
    {!last && <div className="sep"/>}
  </div>
);
