 + debug toggle\n  const moonSec = document.createElement('div');\n  moonSec.className = 'tp-section tp-moon';\n  moonSec.innerHTML = `\n    <span class=\"tp-label\">Hebrew day of month<\u002Fspan>\n    <div class=\"tp-moon-state\" id=\"moonStateLabel\">День 7 · Первая четверть<\u002Fdiv>\n    <input type=\"range\" min=\"1\" max=\"30\" step=\"1\" value=\"7\" class=\"tp-slider\" id=\"moonDaySlider\" />\n    <div class=\"tp-moon-scale\"><span>1<\u002Fspan><span>15<\u002Fspan><span>30<\u002Fspan><\u002Fdiv>\n    <button class=\"tp-toggle-row\" id=\"moonPathToggle\">\n      <span class=\"sw\"><\u002Fspan>\n      <span>Show moon path debug<\u002Fspan>\n    <\u002Fbutton>\n  `;\n  $panel.appendChild(moonSec);\n\n  // segmented click handling\n  $panel.addEventListener('click', e => {\n    const opt = e.target.closest('.opt');\n    if (!opt) return;\n    const key = opt.parentElement.dataset.key;\n    setTweak(key, opt.dataset.v);\n  });\n\n  // moon day slider\n  const $daySlider = document.getElementById('moonDaySlider');\n  $daySlider.addEventListener('input', e => {\n    setTweak('hebrewDay', +e.target.value);\n  });\n  // path debug toggle\n  const $pathToggle = document.getElementById('moonPathToggle');\n  $pathToggle.addEventListener('click', () => {\n    setTweak('showMoonPath', !tweaks.showMoonPath);\n  });\n}\n\n/* ---- edit-mode protocol (toolbar toggle) ---- */\nconst $tweaksFab   = document.getElementById('tweaksFab');\nconst $tweaksPanel = document.getElementById('tweaksPanel');\nconst $tweaksClose = document.getElementById('tweaksClose');\n\nfunction openPanel()  { $tweaksPanel.classList.add('is-open');  $tweaksFab.classList.remove('is-shown'); }\nfunction closePanel() {\n  $tweaksPanel.classList.remove('is-open');\n  $tweaksFab.classList.add('is-shown');\n  try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (e) {}\n}\n\n// listener first, then announce availability (order matters)\nwindow.addEventListener('message', (e) => {\n  const d = e.data;\n  if (!d || typeof d !== 'object') return;\n  if (d.type === '__activate_edit_mode')   openPanel();\n  if (d.type === '__deactivate_edit_mode') closePanel();\n});\ntry { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}\n\n$tweaksFab.addEventListener('click', openPanel);\n$tweaksClose.addEventListener('click', closePanel);\n\n/* =========================================================================\n   MOON PHASE — geometry-correct SVG (used by main moon, swatches, demo row)\n   ========================================================================= */\n\n/* Build the SVG path for the SHADOW (unlit) area at phase ∈ [0, 1].\n   phase: 0 = new, 0.25 = First Q, 0.5 = full, 0.75 = Last Q, 1 = new again.\n\n   - The moon is a unit disk (r=50, center 50,50).\n   - The terminator (lit/dark boundary) always passes through TOP and BOTTOM\n     poles of the moon.\n   - At quarter phases the terminator is a STRAIGHT vertical line (no curve).\n   - Elsewhere it's a half-ellipse with ry = 50 and rx = |b|, where b is the\n     horizontal offset of the terminator from the moon center.\n       waxing (light right): b = +50→0→-50 as phase 0→0.25→0.5; shadow on LEFT\n       waning (light left):  mirrored; shadow on RIGHT\n*/\nfunction moonShadowPath(phase) {\n  phase = ((phase % 1) + 1) % 1;\n  if (phase < 0.005 || phase > 0.995) {\n    return 'M 0,50 a 50,50 0 1,0 100,0 a 50,50 0 1,0 -100,0 Z';\n  }\n  if (Math.abs(phase - 0.5) < 0.005) return '';\n  const waxing = phase < 0.5;\n  const b = waxing\n    ? (50 - 200 * phase)\n    : (50 - 200 * (phase - 0.5));\n  const rx = Math.abs(b);\n  const sweep = b > 0 ? 0 : 1;\n  if (waxing) {\n    if (rx < 0.5) return 'M 50,0 A 50,50 0 0,0 50,100 L 50,0 Z';\n    return `M 50,0 A 50,50 0 0,0 50,100 A ${rx},50 0 0,${sweep} 50,0 Z`;\n  } else {\n    if (rx < 0.5) return 'M 50,0 A 50,50 0 0,1 50,100 L 50,0 Z';\n    return `M 50,0 A 50,50 0 0,1 50,100 A ${rx},50 0 0,${sweep} 50,0 Z`;\n  }\n}\n\n/* Build complete moon SVG markup. useGradient=true → the production gradient\n   look (main moon). false → flat fills for tiny previews. */\nlet _moonIdCounter = 0;\nfunction buildMoonSVG(phase, useGradient) {\n  const id = 'mp-' + (_moonIdCounter++);\n  const litFill  = useGradient ? `url(#${id}-lit)`  : '#d8d9e0';\n  const darkFill = useGradient ? `url(#${id}-dark)` : '#070914';\n  const defs = useGradient ? `<defs>\n    <radialGradient id=\"${id}-lit\" cx=\"38%\" cy=\"34%\" r=\"80%\">\n      <stop offset=\"0%\"   stop-color=\"#f3f4f8\"/>\n      <stop offset=\"35%\"  stop-color=\"#d2d4de\"/>\n      <stop offset=\"75%\"  stop-color=\"#989ba6\"/>\n      <stop offset=\"100%\" stop-color=\"#5a5c68\"/>\n    <\u002FradialGradient>\n    <radialGradient id=\"${id}-dark\" cx=\"35%\" cy=\"50%\" r=\"70%\">\n      <stop offset=\"0%\"   stop-color=\"#0e1430\"/>\n      <stop offset=\"60%\"  stop-color=\"#04060f\"/>\n      <stop offset=\"100%\" stop-color=\"#02030a\"/>\n    <\u002FradialGradient>\n  <\u002Fdefs>` : '';\n  return `<svg viewBox=\"0 0 100 100\" preserveAspectRatio=\"xMidYMid meet\">${defs}<circle cx=\"50\" cy=\"50\" r=\"50\" fill=\"${litFill}\"/><path class=\"moon-shadow\" d=\"${moonShadowPath(phase)}\" fill=\"${darkFill}\"/><\u002Fsvg>`;\n}\n\n/* =========================================================================\n   getMoonVisualState(hebrewDay) — single source of truth for moon visuals\n   ========================================================================= */\nfunction getMoonVisualState(hebrewDay) {\n  const day = Math.max(1, Math.min(30, Math.round(hebrewDay)));\n\n  // numerical phase for shape rendering (0..1), anchored at canonical days\n  let phase;\n  if (day <= 1)        phase = 0;\n  else if (day <= 7)   phase = ((day - 1) / 6) * 0.25;          // 1→0, 7→0.25\n  else if (day <= 15)  phase = 0.25 + ((day - 7) / 8) * 0.25;   // 7→0.25, 15→0.5\n  else if (day <= 22)  phase = 0.5  + ((day - 15) / 7) * 0.25;  // 15→0.5, 22→0.75\n  else                 phase = 0.75 + ((day - 22) / 8) * 0.25;  // 22→0.75, 30→1\n\n  // human-readable label by day range\n  let labelRu;\n  if (day === 1)        labelRu = 'Рош Ходеш · Новолуние';\n  else if (day >= 25)   labelRu = 'Старый серп';\n  else if (day >= 21)   labelRu = 'Последняя четверть';\n  else if (day >= 16)   labelRu = 'Убывающая горбатая';\n  else if (day === 15)  labelRu = 'Полнолуние';\n  else if (day >= 11)   labelRu = 'Растущая горбатая';\n  else if (day >= 7)    labelRu = 'Первая четверть';\n  else                  labelRu = 'Растущий серп';\n\n  // artistic position arc — low at edges, high at full moon\n  const t = (day - 1) / 29;                       // 0..1\n  const xPercent = 12 + t * 76;                   // 12% → 88%\n  const yPercent = 32 - 24 * Math.sin(t * Math.PI); // 32% (edges) → 8% (mid)\n\n  // brightness profile — peaks at full, dim at new\n  const fullness = 1 - Math.abs(phase - 0.5) * 2;  // 0 at new, 1 at full\n  const opacity  = 0.16 + 0.84 * fullness;\n  const glow     = 0.30 + 0.70 * fullness;\n  const scale    = 0.78 + 0.28 * fullness;\n\n  return {\n    phase,\n    phaseProgress: phase,\n    xPercent, yPercent,\n    opacity, glow, scale,\n    labelRu,\n  };\n}\n\n/* Init the main moon SVG inside its stage */\nconst $moonHost = document.getElementById('mainMoon');\n$moonHost.innerHTML = buildMoonSVG(0.5, true);\nlet $moonShadow = $moonHost.querySelector('.moon-shadow');\n\n/* Apply visual state for a given Hebrew day */\nfunction applyMoonDay(day) {\n  const v = getMoonVisualState(day);\n  $moonShadow.setAttribute('d', moonShadowPath(v.phase));\n  $moonHost.style.setProperty('--moon-x', v.xPercent + '%');\n  $moonHost.style.setProperty('--moon-y', v.yPercent + '%');\n  $moonHost.style.setProperty('--moon-scale',   v.scale);\n  $moonHost.style.setProperty('--moon-glow',    v.glow);\n  $moonHost.style.setProperty('--moon-opacity', v.opacity);\n  // state label in tweaks panel\n  const $label = document.getElementById('moonStateLabel');\n  if ($label) $label.innerHTML = `<strong>День ${day}<\u002Fstrong> · ${v.labelRu}`;\n  // mark the current marker on the path overlay\n  document.querySelectorAll('.path-marker').forEach(m => {\n    m.classList.toggle('is-current', +m.dataset.day === day);\n  });\n}\n\n/* Build the path-debug arc + day markers (1 · 7 · 15 · 22 · 30) */\nfunction buildMoonPath() {\n  // arc path — sample every day to get a smooth curve\n  const pts = [];\n  for (let d = 1; d <= 30; d++) {\n    const v = getMoonVisualState(d);\n    pts.push([v.xPercent, v.yPercent]);\n  }\n  const d = 'M ' + pts.map(p => p[0].toFixed(2) + ',' + p[1].toFixed(2)).join(' L ');\n  document.getElementById('moonPathArc').setAttribute('d', d);\n\n  // markers at canonical days\n  const $markers = document.getElementById('pathMarkers');\n  const DAYS = [1, 7, 15, 22, 30];\n  $markers.innerHTML = DAYS.map(day => {\n    const v = getMoonVisualState(day);\n    return `<div class=\"path-marker\" data-day=\"${day}\" style=\"left:${v.xPercent}%;top:${v.yPercent}%;\">${day}<\u002Fdiv>`;\n  }).join('');\n}\nbuildMoonPath();\n\n/* Geometry-verification row: all 8 phases at fixed positions */\nfunction buildPhasesRow() {\n  const PHASES = [\n    { p: 0,     label: 'Новолуние' },\n    { p: 0.125, label: 'Растущий\\nсерп' },\n    { p: 0.25,  label: 'Первая\\nчетверть' },\n    { p: 0.375, label: 'Растущая\\nгорбатая' },\n    { p: 0.5,   label: 'Полная' },\n    { p: 0.625, label: 'Убывающая\\nгорбатая' },\n    { p: 0.75,  label: 'Последняя\\nчетверть' },\n    { p: 0.875, label: 'Старый\\nсерп' },\n  ];\n  const row = document.getElementById('moonPhasesRow');\n  row.innerHTML = PHASES.map(ph =>\n    `<div class=\"mp-cell\">\n       <div class=\"mp-disc\">${buildMoonSVG(ph.p, false)}<\u002Fdiv>\n       <div>${ph.label.replace(/\\n/g, '<br/>')}<\u002Fdiv>\n     <\u002Fdiv>`\n  ).join('');\n}\nbuildPhasesRow();\n\nbuildPanel();\napplyTweaks();\n// fab visible by default when running stand-alone (double-click open)\n$tweaksFab.classList.add('is-shown');\n\n/* ---- init ---- */\n$autoToggle.classList.toggle('is-on', state.autoTransition);\nrender();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
