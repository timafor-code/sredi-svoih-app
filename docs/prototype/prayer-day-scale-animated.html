document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"ru\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Шкала дня · анимированный прототип<\u002Ftitle>\n\n<style>\n/* =========================================================================\n   ШКАЛА ДНЯ · animated prototype\n   Standalone HTML/CSS/JS. No external assets, no network.\n   Sections:\n     · tokens          — CSS variables / design tokens\n     · page chrome     — host page (mock screen background)\n     · day-scale card  — the artefact\n     · scene layers    — dawn / day / sunset / night (crossfade)\n     · scale + marker  — Шахарит / Минха / Маарив, current time\n     · controllers     — period buttons, slider, demo, auto\n   ========================================================================= */\n\n/* ---------- tokens ---------- */\n:root {\n  --bg: #07080d;\n  --card-bg: rgba(255,255,255,0.04);\n  --card-stroke: rgba(255,255,255,0.10);\n  --card-stroke-soft: rgba(255,255,255,0.06);\n  --text: #ffffff;\n  --text-2: rgba(255,255,255,0.62);\n  --text-3: rgba(255,255,255,0.40);\n  --text-4: rgba(255,255,255,0.24);\n\n  --gold: #F6A400;\n  --gold-soft: #F4C45E;\n  --orange: #F07A2A;\n  --red-warm: #E05A10;\n  --blue: #5470E0;\n  --indigo: #6A5BD9;\n  --violet: #7A4FE0;\n\n  /* segment colors */\n  --seg-shacharit: linear-gradient(180deg, rgba(255,190,40,0.85), rgba(220,140,20,0.78));\n  --seg-mincha:    linear-gradient(180deg, rgba(240,120,42,0.88), rgba(210,72,30,0.82));\n  --seg-maariv:    linear-gradient(180deg, rgba(110,110,220,0.78), rgba(70,72,180,0.78));\n  --seg-night:     linear-gradient(180deg, rgba(40,46,90,0.85), rgba(20,24,55,0.85));\n  --seg-break:     rgba(255,255,255,0.06);\n\n  /* animation timings (tokens — copy into RN as constants) */\n  --xfade: 1100ms;\n  --xfade-ease: cubic-bezier(.55,.08,.25,1);\n  --pulse: 6.5s;\n  --drift: 28s;\n  --twinkle: 3.2s;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }\nhtml, body { background: var(--bg); color: var(--text);\n  font-family: -apple-system, BlinkMacSystemFont, \"SF Pro Display\", \"Inter\", system-ui, sans-serif;\n  -webkit-font-smoothing: antialiased; min-height: 100%;\n}\nbody {\n  background:\n    radial-gradient(1200px 700px at 30% -10%, rgba(80,90,180,0.10), transparent 60%),\n    radial-gradient(900px 600px at 110% 120%, rgba(240,122,42,0.06), transparent 55%),\n    var(--bg);\n  padding: 28px 16px 80px;\n  display: flex; flex-direction: column; align-items: center;\n}\n\n/* page chrome (mock surroundings) */\n.page-shell { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 16px; }\n.page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }\n.page-sub   { font-size: 13px; color: var(--text-3); margin-top: 4px; display:flex; gap: 6px; align-items:center; }\n.page-sub .city { color: var(--text-2); }\n\n/* generic glass card to match existing app */\n.glass-card {\n  position: relative;\n  background: var(--card-bg);\n  backdrop-filter: blur(14px) saturate(120%);\n  -webkit-backdrop-filter: blur(14px) saturate(120%);\n  border: 1px solid var(--card-stroke);\n  border-radius: 22px;\n  overflow: hidden;\n}\n\n/* ============================================================\n   DAY SCALE CARD\n   ============================================================ */\n.dayscale {\n  padding: 0;\n  isolation: isolate;\n  border-radius: 24px;\n  border-color: rgba(255,255,255,0.08);\n  box-shadow:\n    0 30px 60px -30px rgba(0,0,0,0.7),\n    inset 0 1px 0 rgba(255,255,255,0.06);\n}\n.dayscale .ds-inner { position: relative; padding: 18px 18px 18px; }\n\n/* card-wide top sheen for premium feel */\n.dayscale::before {\n  content: \"\"; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;\n  background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0) 30%);\n  mix-blend-mode: overlay; opacity: 0.6;\n}\n\n.ds-eyebrow {\n  font-size: 10.5px; font-weight: 600; color: rgba(255,255,255,0.55);\n  letter-spacing: 1.4px; margin-bottom: 34px;\n  display:flex; align-items:center; gap: 10px;\n}\n.ds-eyebrow .dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--gold);\n  box-shadow: 0 0 10px rgba(246,164,0,0.7);\n}\n.ds-eyebrow .period-label {\n  margin-left: auto;\n  font-size: 11px; letter-spacing: 0.6px; font-weight: 600;\n  color: rgba(255,255,255,0.78);\n  padding: 4px 10px; border-radius: 99px;\n  background: rgba(255,255,255,0.08);\n  border: 1px solid rgba(255,255,255,0.10);\n  text-transform: none;\n  transition: background .4s ease, color .4s ease, border-color .4s ease;\n}\n\n/* ============================================================\n   SCENE LAYERS — crossfade backgrounds\n   each scene is a stack of absolutely-positioned div layers,\n   the whole .scene fades opacity 0/1 between periods.\n   ============================================================ */\n.scenes {\n  position: absolute; inset: 0; border-radius: inherit;\n  overflow: hidden; z-index: 0; pointer-events: none;\n}\n.scene {\n  position: absolute; inset: 0;\n  opacity: 0;\n  transition: opacity var(--xfade) var(--xfade-ease);\n  will-change: opacity;\n}\n.scene.is-active { opacity: 1; }\n\n/* shared layer helpers */\n.layer { position: absolute; inset: 0; }\n.blob  { position: absolute; border-radius: 50%; filter: blur(40px); will-change: transform, opacity; }\n\n/* ------- DAWN ------- */\n.scene-dawn .base {\n  background:\n    radial-gradient(120% 80% at 50% 110%, rgba(255,180,90,0.55), rgba(255,180,90,0) 55%),\n    radial-gradient(140% 100% at 50% 130%, rgba(246,164,0,0.40), rgba(246,164,0,0) 60%),\n    linear-gradient(180deg, #1a1730 0%, #2b1d2c 45%, #3e2a23 80%, #5a3923 100%);\n}\n.scene-dawn .horizon-glow {\n  bottom: -10%; left: -10%; right: -10%; height: 60%;\n  background: radial-gradient(ellipse at 50% 100%, rgba(255,210,140,0.55) 0%, rgba(255,160,80,0.25) 30%, transparent 65%);\n  filter: blur(8px);\n  animation: dawnBreathe var(--pulse) ease-in-out infinite alternate;\n}\n.scene-dawn .haze {\n  inset: 30% -20% 0 -20%;\n  background:\n    radial-gradient(60% 40% at 30% 70%, rgba(255,210,170,0.10), transparent 70%),\n    radial-gradient(50% 40% at 75% 60%, rgba(255,180,140,0.08), transparent 70%);\n  filter: blur(24px);\n  animation: hazeDrift 22s ease-in-out infinite alternate;\n}\n.scene-dawn .b1 { width: 60%; aspect-ratio: 1; left: 10%; bottom: -20%;\n  background: radial-gradient(circle, rgba(255,190,120,0.55), rgba(255,190,120,0) 70%);\n  animation: dawnBreathe 7.5s ease-in-out infinite alternate;\n}\n.scene-dawn .b2 { width: 50%; aspect-ratio: 1; right: 0%; bottom: -10%;\n  background: radial-gradient(circle, rgba(255,140,80,0.4), rgba(255,140,80,0) 70%);\n  animation: dawnBreathe 9s ease-in-out infinite alternate-reverse;\n}\n/* rising sun disk — clearly visible motion */\n.scene-dawn .sun-rise {\n  position: absolute; left: 50%; bottom: -90px;\n  width: 180px; height: 180px; border-radius: 50%;\n  margin-left: -90px;\n  background:\n    radial-gradient(circle at 50% 50%, rgba(255,235,180,0.95) 0%, rgba(255,200,120,0.7) 30%, rgba(255,160,80,0.35) 55%, transparent 75%);\n  filter: blur(2px);\n  animation: sunRise 14s ease-in-out infinite alternate;\n}\n/* warm rising embers */\n.scene-dawn .embers { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }\n.scene-dawn .ember {\n  position: absolute; bottom: -8px;\n  width: 3px; height: 3px; border-radius: 50%;\n  background: rgba(255,210,140,0.9);\n  box-shadow: 0 0 8px rgba(255,180,100,0.85);\n  animation: emberFloat 9s linear infinite;\n  opacity: 0;\n}\n\n@keyframes sunRise {\n  0%   { transform: translateY(60px) scale(0.85); opacity: 0.5; }\n  100% { transform: translateY(-30px) scale(1);   opacity: 1; }\n}\n@keyframes emberFloat {\n  0%   { transform: translate(0, 0)        scale(0.6); opacity: 0; }\n  15%  { opacity: 0.9; }\n  80%  { opacity: 0.7; }\n  100% { transform: translate(var(--dx,0), -260px) scale(1.1); opacity: 0; }\n}\n@keyframes dawnBreathe {\n  0% { transform: translateY(4px) scale(1);   opacity: .85; }\n  100%{ transform: translateY(-8px) scale(1.06); opacity: 1; }\n}\n@keyframes hazeDrift {\n  0% { transform: translateX(-12px); }\n  100%{ transform: translateX(14px); }\n}\n\n/* ------- DAY ------- */\n.scene-day .base {\n  background:\n    radial-gradient(110% 70% at 70% -10%, rgba(255,220,160,0.30), transparent 55%),\n    linear-gradient(180deg, #1c3270 0%, #1a4592 35%, #1f5fb1 70%, #245ea0 100%);\n}\n.scene-day .sun {\n  width: 240px; height: 240px; right: -40px; top: -40px;\n  background: radial-gradient(circle, rgba(255,235,180,0.55), rgba(255,210,140,0.22) 40%, rgba(255,210,140,0) 70%);\n  filter: blur(20px);\n  animation: sunBreathe 8s ease-in-out infinite alternate;\n}\n.scene-day .ray {\n  position: absolute; inset: -20% -10% -20% 30%;\n  background:\n    linear-gradient(100deg, transparent 30%, rgba(255,255,255,0.06) 45%, rgba(255,255,255,0.10) 50%, rgba(255,255,255,0.05) 55%, transparent 70%);\n  animation: rayDrift 18s linear infinite;\n  mix-blend-mode: screen;\n}\n.scene-day .ray2 {\n  position: absolute; inset: -30% -20% -10% -20%;\n  background:\n    linear-gradient(80deg, transparent 40%, rgba(255,255,255,0.04) 55%, transparent 70%);\n  animation: rayDrift2 26s linear infinite;\n  mix-blend-mode: screen;\n}\n.scene-day .cloud {\n  position: absolute; width: 60%; height: 32%; left: -30%; top: 18%;\n  background:\n    radial-gradient(40% 50% at 30% 50%, rgba(255,255,255,0.16), transparent 70%),\n    radial-gradient(50% 60% at 65% 55%, rgba(255,255,255,0.18), transparent 70%),\n    radial-gradient(35% 45% at 85% 50%, rgba(255,255,255,0.12), transparent 70%);\n  filter: blur(14px);\n  animation: cloudDrift 38s linear infinite;\n}\n/* second cloud band — different depth, different speed (parallax) */\n.scene-day .cloud2 {\n  position: absolute; width: 55%; height: 22%; left: -20%; top: 48%;\n  background:\n    radial-gradient(45% 55% at 40% 50%, rgba(255,255,255,0.10), transparent 70%),\n    radial-gradient(40% 50% at 75% 55%, rgba(255,255,255,0.08), transparent 70%);\n  filter: blur(18px);\n  animation: cloudDrift 60s linear infinite;\n  animation-delay: -20s;\n}\n/* third — small and fast, closer to the eye */\n.scene-day .cloud3 {\n  position: absolute; width: 30%; height: 18%; left: -25%; top: 10%;\n  background: radial-gradient(50% 60% at 50% 50%, rgba(255,255,255,0.12), transparent 70%);\n  filter: blur(10px);\n  animation: cloudDrift 22s linear infinite;\n  animation-delay: -8s;\n}\n@keyframes sunBreathe {\n  0% { transform: scale(1); opacity: .9; }\n  100%{ transform: scale(1.08); opacity: 1; }\n}\n@keyframes rayDrift  { 0% { transform: translateX(-20%);} 100% { transform: translateX(20%);} }\n@keyframes rayDrift2 { 0% { transform: translateX(20%);}  100% { transform: translateX(-20%);} }\n@keyframes cloudDrift{ 0% { transform: translateX(-30%);} 100% { transform: translateX(180%);} }\n\n/* ------- SUNSET ------- */\n.scene-sunset .base {\n  background:\n    radial-gradient(130% 80% at 50% 120%, rgba(255,140,70,0.55), transparent 60%),\n    linear-gradient(180deg, #2a1a55 0%, #4a1f5f 35%, #7a2b58 65%, #b65530 90%, #d97a2f 100%);\n}\n.scene-sunset .horizon {\n  position: absolute; left: -5%; right: -5%; bottom: 22%;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, rgba(255,200,130,0.7), rgba(255,160,90,0.9), rgba(255,200,130,0.7), transparent);\n  box-shadow: 0 0 24px rgba(255,170,90,0.6), 0 0 60px rgba(255,140,80,0.35);\n  animation: horizonShimmer 5s ease-in-out infinite alternate;\n}\n.scene-sunset .b1 {\n  width: 70%; aspect-ratio: 2.5/1; left: -10%; bottom: 25%;\n  background: radial-gradient(50% 100% at 50% 50%, rgba(140,80,160,0.45), transparent 70%);\n  filter: blur(28px);\n  animation: cloudPan 38s linear infinite;\n}\n.scene-sunset .b2 {\n  width: 60%; aspect-ratio: 2.5/1; right: -20%; bottom: 40%;\n  background: radial-gradient(50% 100% at 50% 50%, rgba(80,40,90,0.45), transparent 70%);\n  filter: blur(30px);\n  animation: cloudPan2 46s linear infinite;\n}\n.scene-sunset .glow {\n  position:absolute; left: 30%; right: 30%; bottom: 0; height: 40%;\n  background: radial-gradient(50% 100% at 50% 100%, rgba(255,180,100,0.45), transparent 70%);\n  filter: blur(16px);\n  animation: dawnBreathe 7s ease-in-out infinite alternate;\n}\n/* setting sun disk — slowly descends past the horizon line */\n.scene-sunset .sun-set {\n  position: absolute; left: 50%; bottom: 18%;\n  width: 140px; height: 140px; border-radius: 50%;\n  margin-left: -70px;\n  background:\n    radial-gradient(circle at 50% 50%, rgba(255,210,140,0.95) 0%, rgba(255,150,80,0.7) 35%, rgba(255,100,60,0.35) 60%, transparent 78%);\n  filter: blur(1px);\n  animation: sunSet 16s ease-in-out infinite alternate;\n}\n/* horizontal cloud streaks — long, thin, fast for parallax against blobs */\n.scene-sunset .streak {\n  position: absolute; left: -40%; right: -40%; height: 8px;\n  background: linear-gradient(90deg, transparent, rgba(60,30,50,0.55) 30%, rgba(80,40,60,0.7) 50%, rgba(60,30,50,0.55) 70%, transparent);\n  filter: blur(4px);\n  border-radius: 99px;\n}\n.scene-sunset .streak.s1 { top: 38%; animation: streakPan 22s linear infinite; }\n.scene-sunset .streak.s2 { top: 46%; height: 5px; opacity: 0.7; animation: streakPan 30s linear infinite; animation-delay: -12s; }\n.scene-sunset .streak.s3 { top: 55%; height: 6px; opacity: 0.55; animation: streakPanRev 26s linear infinite; }\n/* slow lens flare — diagonal warm flash */\n.scene-sunset .flare {\n  position: absolute; left: -10%; top: 20%; width: 40%; aspect-ratio: 1;\n  background: radial-gradient(circle, rgba(255,210,150,0.35), transparent 65%);\n  filter: blur(20px);\n  animation: flareDrift 24s ease-in-out infinite alternate;\n  mix-blend-mode: screen;\n}\n\n@keyframes horizonShimmer { 0% { opacity: .8; } 100% { opacity: 1; } }\n@keyframes cloudPan  { 0% { transform: translateX(0); } 100% { transform: translateX(40%); } }\n@keyframes cloudPan2 { 0% { transform: translateX(0); } 100% { transform: translateX(-35%); } }\n@keyframes streakPan    { 0% { transform: translateX(-20%); } 100% { transform: translateX(40%); } }\n@keyframes streakPanRev { 0% { transform: translateX(30%); }  100% { transform: translateX(-30%); } }\n@keyframes flareDrift   { 0% { transform: translate(0, 0) scale(1); opacity: 0.6; }\n                          100% { transform: translate(140%, 30px) scale(1.15); opacity: 1; } }\n@keyframes sunSet {\n  0%   { transform: translateY(-30px); opacity: 1; }\n  100% { transform: translateY(80px);  opacity: 0.55; }\n}\n\n/* ------- NIGHT ------- */\n.scene-night .base {\n  background:\n    radial-gradient(120% 60% at 50% 110%, rgba(90,60,180,0.30), transparent 60%),\n    linear-gradient(180deg, #060617 0%, #0c0e2a 40%, #161540 75%, #1d1a4a 100%);\n}\n.scene-night .aurora {\n  position:absolute; left: -10%; right: -10%; bottom: -10%; height: 60%;\n  background:\n    radial-gradient(60% 50% at 30% 100%, rgba(120,70,200,0.40), transparent 70%),\n    radial-gradient(60% 50% at 70% 100%, rgba(70,90,200,0.35), transparent 70%);\n  filter: blur(28px);\n  animation: auroraBreathe 9s ease-in-out infinite alternate;\n}\n.scene-night .stars { position: absolute; inset: 0; }\n.scene-night .star  {\n  position: absolute; width: 2px; height: 2px; border-radius: 50%;\n  background: #fff; box-shadow: 0 0 4px rgba(255,255,255,0.7);\n  opacity: 0.7;\n}\n.scene-night .star.tw {\n  animation: twinkle var(--twinkle) ease-in-out infinite;\n}\n.scene-night .star.big { width: 3px; height: 3px; box-shadow: 0 0 8px rgba(200,220,255,0.9); }\n\n/* soft moon — clean minimalist disk, geometry-correct phases via SVG path.\n   The terminator is computed in JS:\n     · quarter phases → a perfectly straight vertical line (no curve)\n     · crescent / gibbous → a half-ellipse arc on the correct side\n   See moonShadowPath() in JS for the geometry. */\n.moon-stage {\n  position: absolute; inset: 0;\n  pointer-events: none;\n  z-index: 1;\n  opacity: 0;\n  transition: opacity .9s ease;\n}\n.moon-stage.is-night  { opacity: 1; }\n.moon-stage.is-sunset { opacity: 0.40; }\n.moon-stage.is-dawn,\n.moon-stage.is-day    { opacity: 0; }\n\n.moon-stage .moon {\n  position: absolute;\n  width: var(--moon-size, 64px);\n  height: var(--moon-size, 64px);\n  left: var(--moon-x, 78%);\n  top:  var(--moon-y, 22%);\n  transform: translate(-50%, -50%) scale(var(--moon-scale, 1));\n  opacity: var(--moon-opacity, 1);\n  filter:\n    drop-shadow(0 0 calc(12px * var(--moon-glow, 1)) rgba(180,200,255,0.5))\n    drop-shadow(0 0 calc(30px * var(--moon-glow, 1)) rgba(140,160,230,0.3));\n  animation: moonBreathe 7s ease-in-out infinite alternate;\n  transition: left .9s ease, top .9s ease, transform .9s ease, opacity .9s ease;\n}\n.moon-stage .moon svg { width: 100%; height: 100%; display: block; }\n\n/* path debug overlay (toggle via .is-path-debug on .dayscale) */\n.moon-path-svg {\n  position: absolute; inset: 0;\n  width: 100%; height: 100%;\n  opacity: 0;\n  transition: opacity .35s ease;\n}\n.path-markers {\n  position: absolute; inset: 0;\n  opacity: 0;\n  transition: opacity .35s ease;\n}\n.dayscale.is-path-debug .moon-path-svg,\n.dayscale.is-path-debug .path-markers { opacity: 1; }\n\n.path-marker {\n  position: absolute;\n  transform: translate(-50%, -50%);\n  width: 22px; height: 22px;\n  font-size: 10px;\n  font-weight: 700;\n  font-variant-numeric: tabular-nums;\n  display: flex; align-items: center; justify-content: center;\n  background: rgba(8,10,20,0.78);\n  color: rgba(255,255,255,0.92);\n  border: 1px solid rgba(255,255,255,0.30);\n  border-radius: 50%;\n  backdrop-filter: blur(6px);\n  -webkit-backdrop-filter: blur(6px);\n  box-shadow: 0 4px 10px rgba(0,0,0,0.45);\n}\n.path-marker.is-current {\n  border-color: rgba(246,164,0,0.95);\n  color: #fff;\n  background: linear-gradient(135deg, rgba(246,164,0,0.55), rgba(240,122,42,0.45));\n  box-shadow: 0 0 0 2px rgba(246,164,0,0.20), 0 6px 16px rgba(246,164,0,0.4);\n}\n/* shooting star — diagonal streak that flashes every cycle */\n.scene-night .shooter {\n  position: absolute; top: 18%; left: -12%;\n  width: 120px; height: 1.5px;\n  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0.95) 90%, #fff 100%);\n  filter: drop-shadow(0 0 4px rgba(200,220,255,0.9));\n  transform: rotate(18deg);\n  transform-origin: right center;\n  animation: shoot 9s ease-in infinite;\n  opacity: 0;\n}\n.scene-night .shooter.s2 {\n  top: 38%; left: -8%;\n  animation-delay: 4.5s;\n  animation-duration: 11s;\n  transform: rotate(22deg);\n}\n@keyframes moonBreathe {\n  0%   { transform: translateY(0)     scale(1);    opacity: 0.85; }\n  100% { transform: translateY(-6px)  scale(1.04); opacity: 1; }\n}\n@keyframes shoot {\n  0%   { transform: translate(0,    0)   rotate(18deg); opacity: 0; }\n  4%   { opacity: 1; }\n  14%  { transform: translate(140%, 60%) rotate(18deg); opacity: 0; }\n  100% { transform: translate(140%, 60%) rotate(18deg); opacity: 0; }\n}\n\n@keyframes auroraBreathe {\n  0% { transform: translateY(8px); opacity: .85; }\n  100%{ transform: translateY(-6px); opacity: 1; }\n}\n@keyframes twinkle {\n  0%,100% { opacity: 0.15; transform: scale(0.9); }\n  50%     { opacity: 1;    transform: scale(1.15); }\n}\n\n/* dim/vignette over the whole stage for legibility */\n.scene-vignette {\n  position: absolute; inset: 0; pointer-events: none; border-radius: inherit;\n  background:\n    radial-gradient(140% 90% at 50% 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.35) 100%),\n    linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.15) 100%);\n  z-index: 1;\n}\n\n/* ============================================================\n   SCALE (segments + zmanim + marker)\n   ============================================================ */\n.ds-stage { position: relative; z-index: 2; }\n\n.scale-wrap { position: relative; margin-top: 2px; }\n.scale-rail {\n  position: relative;\n  display: flex; gap: 2px;\n  height: 36px; border-radius: 10px; overflow: hidden;\n  background: rgba(0,0,0,0.28);\n  border: 1px solid rgba(255,255,255,0.06);\n  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -1px 0 rgba(0,0,0,0.25);\n}\n\n.seg {\n  position: relative;\n  display: flex; align-items: center; justify-content: center;\n  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;\n  color: rgba(255,255,255,0.95);\n  text-shadow: 0 1px 2px rgba(0,0,0,0.35);\n  overflow: hidden;\n  transition: filter .5s ease, transform .5s ease;\n}\n.seg.shacharit { background: var(--seg-shacharit); }\n.seg.mincha    { background: var(--seg-mincha); }\n.seg.maariv    { background: var(--seg-maariv); }\n.seg.night     { background: var(--seg-night); }\n.seg.brk       { background: var(--seg-break); }\n\n.seg::after {\n  content: \"\"; position: absolute; inset: 0; pointer-events: none;\n  background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0) 45%);\n}\n.seg .label { position: relative; z-index: 1; white-space: nowrap; }\n\n/* halo on the segment that currently contains the marker */\n.seg.is-active {\n  filter: saturate(1.15) brightness(1.06);\n}\n.seg.is-active::before {\n  content: \"\"; position: absolute; inset: -2px;\n  border-radius: 8px;\n  box-shadow:\n    0 0 0 1px rgba(255,255,255,0.35) inset,\n    0 0 24px rgba(255,210,140,0.55),\n    0 0 40px rgba(246,164,0,0.35);\n  pointer-events: none;\n}\n.seg.maariv.is-active::before {\n  box-shadow:\n    0 0 0 1px rgba(255,255,255,0.30) inset,\n    0 0 22px rgba(130,140,230,0.55),\n    0 0 40px rgba(110,90,220,0.35);\n}\n.seg.mincha.is-active::before {\n  box-shadow:\n    0 0 0 1px rgba(255,255,255,0.30) inset,\n    0 0 24px rgba(240,140,80,0.6),\n    0 0 40px rgba(224,90,16,0.35);\n}\n.seg.night.is-active::before {\n  box-shadow:\n    0 0 0 1px rgba(255,255,255,0.25) inset,\n    0 0 20px rgba(80,90,180,0.50);\n}\n\n/* time marker (vertical needle + pill) */\n.marker {\n  position: absolute; top: -6px; bottom: -6px;\n  width: 2px;\n  background: linear-gradient(180deg, rgba(255,255,255,0) 0%, #fff 25%, #fff 75%, rgba(255,255,255,0) 100%);\n  box-shadow: 0 0 12px rgba(255,255,255,0.7), 0 0 24px rgba(255,210,140,0.4);\n  transform: translateX(-1px);\n  transition: left .35s cubic-bezier(.4,.0,.2,1);\n  z-index: 3;\n  pointer-events: none;\n}\n.marker::before {\n  content: \"\"; position: absolute; top: 0; left: 50%; transform: translate(-50%,-50%);\n  width: 8px; height: 8px; border-radius: 50%; background: #fff;\n  box-shadow: 0 0 8px #fff, 0 0 16px rgba(255,210,140,0.7);\n}\n.marker .pill {\n  position: absolute; left: 50%; bottom: calc(100% + 6px);\n  transform: translateX(-50%);\n  font-size: 11px; font-weight: 700; color: #fff;\n  background: rgba(15,15,22,0.85);\n  border: 1px solid rgba(255,255,255,0.22);\n  border-radius: 8px; padding: 3px 8px;\n  white-space: nowrap;\n  backdrop-filter: blur(8px);\n  box-shadow: 0 6px 16px rgba(0,0,0,0.4);\n}\n.marker .pill::after {\n  content:\"\"; position:absolute; left:50%; top:100%; transform:translate(-50%,-1px) rotate(45deg);\n  width:6px; height:6px; background: rgba(15,15,22,0.85); border-right:1px solid rgba(255,255,255,0.22); border-bottom:1px solid rgba(255,255,255,0.22);\n}\n\n/* zmanim row */\n.zmanim {\n  margin-top: 14px;\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 8px;\n  position: relative;\n}\n.zm {\n  position: relative;\n  display: flex; flex-direction: column; align-items: flex-start;\n}\n.zm .t  { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }\n.zm .l  { font-size: 10.5px; color: rgba(255,255,255,0.55); margin-top: 2px; letter-spacing: 0.3px; }\n\n/* \"Все зманим\" link in the card */\n.ds-link {\n  margin-top: 14px;\n  font-size: 12px; font-weight: 700; letter-spacing: 0.6px;\n  color: var(--gold);\n  display: flex; align-items: center; gap: 6px;\n  cursor: pointer;\n}\n.ds-link svg { width: 12px; height: 12px; }\n\n/* ============================================================\n   CONTROLLERS\n   ============================================================ */\n.controls {\n  margin-top: 4px;\n  padding: 16px;\n  display: flex; flex-direction: column; gap: 14px;\n}\n.controls .row { display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }\n.controls .row.between { justify-content: space-between; }\n.controls .label-tiny {\n  font-size: 10px; font-weight: 700; color: var(--text-3);\n  letter-spacing: 1.2px; text-transform: uppercase;\n}\n\n.period-btns { display: flex; gap: 6px; width: 100%; }\n.period-btn {\n  flex: 1;\n  font-family: inherit;\n  background: rgba(255,255,255,0.05);\n  border: 1px solid rgba(255,255,255,0.10);\n  color: rgba(255,255,255,0.78);\n  padding: 9px 4px;\n  font-size: 12px; font-weight: 600;\n  border-radius: 12px;\n  cursor: pointer;\n  display: flex; flex-direction: column; align-items: center; gap: 4px;\n  transition: background .2s ease, border-color .2s ease, color .2s ease, transform .2s ease;\n}\n.period-btn:hover { background: rgba(255,255,255,0.08); }\n.period-btn.is-active {\n  background: linear-gradient(135deg, rgba(246,164,0,0.22), rgba(240,122,42,0.18));\n  border-color: rgba(246,164,0,0.55);\n  color: #fff;\n  box-shadow: 0 0 0 1px rgba(246,164,0,0.25) inset, 0 6px 20px -10px rgba(246,164,0,0.6);\n}\n.period-btn .sw {\n  width: 18px; height: 18px; border-radius: 50%;\n  box-shadow: 0 0 0 1px rgba(255,255,255,0.15) inset;\n}\n.period-btn[data-p=\"dawn\"]   .sw { background: linear-gradient(180deg, #5a3923, #f6a440); }\n.period-btn[data-p=\"day\"]    .sw { background: linear-gradient(180deg, #1a4592, #5fa3ff); }\n.period-btn[data-p=\"sunset\"] .sw { background: linear-gradient(180deg, #7a2b58, #ffa05a); }\n.period-btn[data-p=\"night\"]  .sw { background: linear-gradient(180deg, #0c0e2a, #5a4fa3); }\n\n/* slider */\n.slider-row { display: flex; align-items: center; gap: 12px; }\n.slider-row .time {\n  font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums;\n  min-width: 48px; text-align: right; color: #fff;\n}\ninput[type=\"range\"].time-slider {\n  flex: 1; -webkit-appearance: none; appearance: none;\n  height: 6px; border-radius: 99px;\n  background: linear-gradient(90deg, #1a1730, #1a4592 28%, #d97a2f 70%, #0c0e2a);\n  outline: none;\n  border: 1px solid rgba(255,255,255,0.08);\n}\ninput[type=\"range\"].time-slider::-webkit-slider-thumb {\n  -webkit-appearance: none; appearance: none;\n  width: 18px; height: 18px; border-radius: 50%;\n  background: #fff; border: 2px solid rgba(0,0,0,0.4);\n  box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 4px 12px rgba(0,0,0,0.5);\n  cursor: pointer;\n}\ninput[type=\"range\"].time-slider::-moz-range-thumb {\n  width: 18px; height: 18px; border-radius: 50%; background: #fff; border: 2px solid rgba(0,0,0,0.4);\n  box-shadow: 0 0 0 2px rgba(255,255,255,0.15), 0 4px 12px rgba(0,0,0,0.5); cursor: pointer;\n}\n\n/* toggle + play */\n.toggle {\n  display: inline-flex; align-items: center; gap: 8px; cursor: pointer;\n  font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.78);\n}\n.toggle .sw {\n  width: 36px; height: 22px; border-radius: 99px; position: relative;\n  background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.10);\n  transition: background .2s ease;\n}\n.toggle .sw::after {\n  content: \"\"; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;\n  border-radius: 50%; background: #fff; transition: transform .2s ease;\n  box-shadow: 0 2px 6px rgba(0,0,0,0.5);\n}\n.toggle.is-on .sw { background: linear-gradient(135deg, #F07A2A, #E05A10); border-color: rgba(255,170,90,0.6); }\n.toggle.is-on .sw::after { transform: translateX(14px); }\n\n.play-btn {\n  font-family: inherit;\n  background: linear-gradient(135deg, #F07A2A, #E05A10);\n  border: none; color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 0.4px;\n  border-radius: 99px; padding: 9px 16px; cursor: pointer;\n  display: inline-flex; align-items: center; gap: 7px;\n  box-shadow: 0 6px 20px -8px rgba(240,122,42,0.6);\n  transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;\n}\n.play-btn:hover { filter: brightness(1.05); transform: translateY(-1px); }\n.play-btn.is-playing { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); box-shadow: none; }\n.play-btn svg { width: 11px; height: 11px; }\n\n/* implementation notes */\n.notes {\n  width: 100%; max-width: 460px;\n  margin-top: 4px;\n  padding: 18px 20px;\n  font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.72);\n}\n.notes h3 { font-size: 14px; color: #fff; margin-bottom: 10px; letter-spacing: 0.2px; }\n.notes h4 { font-size: 12px; color: var(--gold); margin: 12px 0 4px; letter-spacing: 0.6px; text-transform: uppercase; }\n.notes ul { list-style: none; padding-left: 0; }\n.notes li { position: relative; padding-left: 14px; margin: 4px 0; }\n.notes li::before { content: \"·\"; position: absolute; left: 4px; top: -2px; color: var(--gold); font-weight: 900; }\n.notes code {\n  font-family: ui-monospace, Menlo, monospace; font-size: 12px;\n  background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 4px;\n  color: #f4c45e;\n}\n\n/* checklist */\n.checklist { margin-top: 6px; }\n.checklist li { padding-left: 22px; }\n.checklist li::before {\n  content: \"\"; position: absolute; left: 0; top: 6px;\n  width: 12px; height: 12px; border-radius: 4px;\n  border: 1px solid rgba(255,255,255,0.25);\n  background: rgba(255,255,255,0.04);\n}\n\n/* =============================================================\n   TWEAKS — palette / atmosphere / marker\n   Three expressive controls. Each reshapes the whole card,\n   not a single property.\n   ============================================================= */\n\n/* ---------- PALETTE: aurora ---------- */\n.dayscale[data-palette=\"aurora\"] .scene-dawn .base {\n  background:\n    radial-gradient(120% 80% at 50% 110%, rgba(80,200,200,0.55), transparent 55%),\n    radial-gradient(140% 100% at 50% 130%, rgba(140,80,180,0.40), transparent 60%),\n    linear-gradient(180deg, #0e1a3a 0%, #1f3360 45%, #2e6677 80%, #4ea9a0 100%);\n}\n.dayscale[data-palette=\"aurora\"] .scene-dawn .horizon-glow {\n  background: radial-gradient(ellipse at 50% 100%, rgba(120,240,220,0.50) 0%, rgba(120,180,220,0.25) 30%, transparent 65%);\n}\n.dayscale[data-palette=\"aurora\"] .scene-dawn .b1 { background: radial-gradient(circle, rgba(100,220,210,0.55), transparent 70%); }\n.dayscale[data-palette=\"aurora\"] .scene-dawn .b2 { background: radial-gradient(circle, rgba(160,80,180,0.40), transparent 70%); }\n\n.dayscale[data-palette=\"aurora\"] .scene-day .base {\n  background:\n    radial-gradient(110% 70% at 70% -10%, rgba(180,255,240,0.30), transparent 55%),\n    linear-gradient(180deg, #0e2d40 0%, #115878 35%, #2a9aa8 70%, #4fb5b0 100%);\n}\n.dayscale[data-palette=\"aurora\"] .scene-day .sun {\n  background: radial-gradient(circle, rgba(200,255,240,0.55), rgba(140,220,220,0.22) 40%, transparent 70%);\n}\n\n.dayscale[data-palette=\"aurora\"] .scene-sunset .base {\n  background:\n    radial-gradient(130% 80% at 50% 120%, rgba(220,90,170,0.55), transparent 60%),\n    linear-gradient(180deg, #1a0d3a 0%, #3a155f 35%, #6a2a78 65%, #b04098 90%, #d45088 100%);\n}\n.dayscale[data-palette=\"aurora\"] .scene-sunset .horizon {\n  background: linear-gradient(90deg, transparent, rgba(220,180,255,0.7), rgba(255,140,200,0.9), rgba(220,180,255,0.7), transparent);\n  box-shadow: 0 0 24px rgba(220,130,200,0.6), 0 0 60px rgba(180,80,170,0.35);\n}\n.dayscale[data-palette=\"aurora\"] .scene-sunset .b1 { background: radial-gradient(50% 100% at 50% 50%, rgba(60,180,180,0.45), transparent 70%); }\n.dayscale[data-palette=\"aurora\"] .scene-sunset .b2 { background: radial-gradient(50% 100% at 50% 50%, rgba(100,40,140,0.45), transparent 70%); }\n.dayscale[data-palette=\"aurora\"] .scene-sunset .glow { background: radial-gradient(50% 100% at 50% 100%, rgba(220,130,200,0.45), transparent 70%); }\n\n.dayscale[data-palette=\"aurora\"] .scene-night .base {\n  background:\n    radial-gradient(120% 60% at 50% 110%, rgba(60,200,160,0.30), transparent 60%),\n    linear-gradient(180deg, #040d18 0%, #082030 40%, #103840 75%, #1a4a4a 100%);\n}\n.dayscale[data-palette=\"aurora\"] .scene-night .aurora {\n  background:\n    radial-gradient(60% 50% at 30% 100%, rgba(80,220,160,0.45), transparent 70%),\n    radial-gradient(60% 50% at 70% 100%, rgba(100,180,220,0.35), transparent 70%);\n}\n\n/* ---------- PALETTE: ember ---------- */\n.dayscale[data-palette=\"ember\"] .scene-dawn .base {\n  background:\n    radial-gradient(120% 80% at 50% 110%, rgba(255,140,80,0.55), transparent 55%),\n    radial-gradient(140% 100% at 50% 130%, rgba(200,70,60,0.40), transparent 60%),\n    linear-gradient(180deg, #1d0a14 0%, #321218 45%, #6a2818 80%, #b65430 100%);\n}\n.dayscale[data-palette=\"ember\"] .scene-dawn .horizon-glow {\n  background: radial-gradient(ellipse at 50% 100%, rgba(255,180,100,0.55) 0%, rgba(255,120,60,0.30) 30%, transparent 65%);\n}\n.dayscale[data-palette=\"ember\"] .scene-dawn .b1 { background: radial-gradient(circle, rgba(255,160,100,0.55), transparent 70%); }\n.dayscale[data-palette=\"ember\"] .scene-dawn .b2 { background: radial-gradient(circle, rgba(220,80,60,0.45), transparent 70%); }\n\n.dayscale[data-palette=\"ember\"] .scene-day .base {\n  background:\n    radial-gradient(110% 70% at 70% -10%, rgba(255,220,180,0.30), transparent 55%),\n    linear-gradient(180deg, #1c2238 0%, #2c3d62 35%, #5a6e88 70%, #b8987a 100%);\n}\n.dayscale[data-palette=\"ember\"] .scene-day .sun {\n  background: radial-gradient(circle, rgba(255,230,200,0.55), rgba(255,200,150,0.22) 40%, transparent 70%);\n}\n\n.dayscale[data-palette=\"ember\"] .scene-sunset .base {\n  background:\n    radial-gradient(130% 80% at 50% 120%, rgba(255,90,40,0.55), transparent 60%),\n    linear-gradient(180deg, #160512 0%, #40081c 35%, #7a1018 65%, #b8261a 90%, #d54820 100%);\n}\n.dayscale[data-palette=\"ember\"] .scene-sunset .horizon {\n  background: linear-gradient(90deg, transparent, rgba(255,180,100,0.7), rgba(255,90,50,0.9), rgba(255,180,100,0.7), transparent);\n  box-shadow: 0 0 24px rgba(255,120,50,0.6), 0 0 60px rgba(255,80,40,0.40);\n}\n.dayscale[data-palette=\"ember\"] .scene-sunset .b1 { background: radial-gradient(50% 100% at 50% 50%, rgba(150,40,30,0.50), transparent 70%); }\n.dayscale[data-palette=\"ember\"] .scene-sunset .b2 { background: radial-gradient(50% 100% at 50% 50%, rgba(80,16,12,0.55), transparent 70%); }\n.dayscale[data-palette=\"ember\"] .scene-sunset .glow { background: radial-gradient(50% 100% at 50% 100%, rgba(255,140,60,0.50), transparent 70%); }\n\n.dayscale[data-palette=\"ember\"] .scene-night .base {\n  background:\n    radial-gradient(120% 60% at 50% 110%, rgba(180,60,40,0.30), transparent 60%),\n    linear-gradient(180deg, #0a0608 0%, #15080c 40%, #251220 75%, #321828 100%);\n}\n.dayscale[data-palette=\"ember\"] .scene-night .aurora {\n  background:\n    radial-gradient(60% 50% at 30% 100%, rgba(220,90,60,0.40), transparent 70%),\n    radial-gradient(60% 50% at 70% 100%, rgba(180,60,80,0.35), transparent 70%);\n}\n\n/* ---------- ATMOSPHERE ---------- */\n.dayscale .scenes { transition: filter 600ms ease; }\n.dayscale[data-atmosphere=\"calm\"] .scenes {\n  filter: brightness(0.78) saturate(0.75);\n  --pulse: 12s; --drift: 52s; --twinkle: 5.5s;\n}\n.dayscale[data-atmosphere=\"cinematic\"] .scenes {\n  filter: brightness(1.15) saturate(1.25) contrast(1.05);\n  --pulse: 4s; --drift: 16s; --twinkle: 2.2s;\n}\n.dayscale[data-atmosphere=\"cinematic\"] .seg.is-active::before {\n  box-shadow:\n    0 0 0 1px rgba(255,255,255,0.45) inset,\n    0 0 32px rgba(255,210,140,0.75),\n    0 0 56px rgba(246,164,0,0.50);\n}\n.dayscale[data-atmosphere=\"calm\"] .seg.is-active::before {\n  box-shadow:\n    0 0 0 1px rgba(255,255,255,0.20) inset,\n    0 0 12px rgba(255,210,140,0.25);\n}\n\n/* ---------- MARKER VARIANTS ---------- */\n/* beam: wide column of light, no pill */\n.dayscale[data-marker=\"beam\"] .marker {\n  top: -16px; bottom: -16px;\n  width: 8px; transform: translateX(-4px);\n  background: linear-gradient(180deg, rgba(255,220,150,0) 0%, rgba(255,235,180,0.95) 22%, rgba(255,235,180,0.95) 78%, rgba(255,220,150,0) 100%);\n  box-shadow: 0 0 20px rgba(255,210,140,0.95), 0 0 48px rgba(246,164,0,0.55);\n  border-radius: 6px;\n}\n.dayscale[data-marker=\"beam\"] .marker::before { display: none; }\n.dayscale[data-marker=\"beam\"] .marker .pill { display: none; }\n\n/* chip: hide needle, time pill INSIDE the rail */\n.dayscale[data-marker=\"chip\"] .marker {\n  background: transparent; box-shadow: none;\n  width: 0; top: 0; bottom: 0;\n}\n.dayscale[data-marker=\"chip\"] .marker::before { display: none; }\n.dayscale[data-marker=\"chip\"] .marker .pill {\n  bottom: auto; top: 50%;\n  transform: translate(-50%, -50%);\n  background: rgba(15,15,22,0.95);\n  border-color: rgba(255,255,255,0.32);\n  box-shadow: 0 4px 14px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,210,140,0.30);\n  font-size: 12px; padding: 4px 10px;\n}\n.dayscale[data-marker=\"chip\"] .marker .pill::after { display: none; }\n\n/* =============================================================\n   TWEAKS PANEL\n   ============================================================= */\n.tweaks-fab {\n  position: fixed; right: 18px; bottom: 18px;\n  width: 46px; height: 46px; border-radius: 14px;\n  background: linear-gradient(135deg, #1a1a26, #0f0f17);\n  border: 1px solid rgba(255,255,255,0.18);\n  display: none; align-items: center; justify-content: center;\n  cursor: pointer; z-index: 200;\n  color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5);\n}\n.tweaks-fab.is-shown { display: flex; }\n.tweaks-fab:hover { border-color: rgba(246,164,0,0.5); }\n.tweaks-fab svg { width: 20px; height: 20px; }\n\n.tweaks-panel {\n  position: fixed; right: 18px; bottom: 18px;\n  width: 320px; max-width: calc(100vw - 36px);\n  background: rgba(18,18,26,0.92);\n  backdrop-filter: blur(20px) saturate(140%);\n  -webkit-backdrop-filter: blur(20px) saturate(140%);\n  border: 1px solid rgba(255,255,255,0.12);\n  border-radius: 20px;\n  box-shadow: 0 24px 60px rgba(0,0,0,0.6);\n  padding: 16px;\n  z-index: 200;\n  display: none;\n  color: #fff;\n  font-family: inherit;\n}\n.tweaks-panel.is-open { display: block; }\n.tp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }\n.tp-title { font-size: 12px; font-weight: 700; letter-spacing: 1.4px; color: rgba(255,255,255,0.9); }\n.tp-close {\n  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);\n  color: rgba(255,255,255,0.7); width: 26px; height: 26px; border-radius: 8px;\n  display: flex; align-items: center; justify-content: center; cursor: pointer;\n  font-size: 14px; line-height: 1; padding: 0;\n}\n.tp-close:hover { color: #fff; }\n.tp-section { margin-bottom: 14px; }\n.tp-section:last-child { margin-bottom: 0; }\n.tp-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px; display: block; }\n.tp-segments {\n  display: flex; gap: 4px;\n  background: rgba(255,255,255,0.04);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 12px; padding: 4px;\n}\n.tp-segments .opt {\n  flex: 1; padding: 8px 4px; text-align: center;\n  font-size: 11.5px; font-weight: 600;\n  color: rgba(255,255,255,0.6); border-radius: 9px; cursor: pointer;\n  transition: background .2s ease, color .2s ease;\n  display: flex; flex-direction: column; align-items: center; gap: 6px;\n  border: none; background: none; font-family: inherit;\n}\n.tp-segments .opt:hover { color: #fff; }\n.tp-segments .opt.is-active {\n  background: linear-gradient(135deg, rgba(246,164,0,0.22), rgba(240,122,42,0.18));\n  color: #fff;\n  box-shadow: 0 0 0 1px rgba(246,164,0,0.40) inset;\n}\n.tp-segments .opt .sw {\n  width: 100%; height: 16px; border-radius: 5px;\n  box-shadow: 0 0 0 1px rgba(255,255,255,0.10) inset;\n}\n.tp-segments .opt[data-v=\"classic\"] .sw { background: linear-gradient(90deg, #2b1d2c, #1a4592, #b65530, #0c0e2a); }\n.tp-segments .opt[data-v=\"aurora\"]  .sw { background: linear-gradient(90deg, #1f3360, #2a9aa8, #b04098, #103840); }\n.tp-segments .opt[data-v=\"ember\"]   .sw { background: linear-gradient(90deg, #321218, #2c3d62, #b8261a, #251220); }\n.tp-segments .opt[data-v=\"calm\"]      .sw { background: linear-gradient(90deg, rgba(120,140,170,0.4), rgba(180,180,200,0.55)); }\n.tp-segments .opt[data-v=\"balanced\"]  .sw { background: linear-gradient(90deg, rgba(120,140,200,0.8), rgba(240,160,80,0.8)); }\n.tp-segments .opt[data-v=\"cinematic\"] .sw { background: linear-gradient(90deg, rgba(246,164,0,1), rgba(240,80,180,1)); }\n.tp-segments .opt[data-v=\"pill\"]  .sw { background: rgba(255,255,255,0.10); position: relative; }\n.tp-segments .opt[data-v=\"pill\"]  .sw::after { content:\"\"; position:absolute; left:50%; top:50%; width:2px; height:12px; background:#fff; transform:translate(-50%,-50%); border-radius:2px; box-shadow: 0 -10px 0 -4px #fff; }\n.tp-segments .opt[data-v=\"beam\"]  .sw { background: rgba(255,255,255,0.10); position: relative; }\n.tp-segments .opt[data-v=\"beam\"]  .sw::after { content:\"\"; position:absolute; left:50%; top:0; bottom:0; width:5px; transform:translateX(-50%); background:linear-gradient(180deg, transparent, #ffd57a, transparent); border-radius:3px; box-shadow:0 0 8px rgba(255,210,140,0.8); }\n.tp-segments .opt[data-v=\"chip\"]  .sw { background: rgba(255,255,255,0.10); position: relative; }\n.tp-segments .opt[data-v=\"chip\"]  .sw::after { content:\"\"; position:absolute; left:50%; top:50%; width:14px; height:8px; background:#fff; transform:translate(-50%,-50%); border-radius:3px; box-shadow:0 0 0 2px rgba(255,210,140,0.5); }\n\n/* moon-phase swatches: tiny moons preview the actual phase */\n.tp-segments[data-key=\"moon\"] .opt .sw {\n  height: 20px; width: 20px; border-radius: 50%;\n  margin: 0 auto 2px; padding: 0;\n  background: transparent;\n  display: flex; align-items: center; justify-content: center;\n  color: rgba(255,255,255,0.85);\n  overflow: visible;\n  box-shadow: none;\n}\n.tp-segments[data-key=\"moon\"] .opt .sw svg { width: 100%; height: 100%; display: block; }\n.tp-segments[data-key=\"moon\"] .opt[data-v=\"auto\"] .sw svg { width: 14px; height: 14px; }\n.tp-segments[data-key=\"moon\"] .opt { padding: 6px 2px; font-size: 10.5px; }\n\n/* moon-phases demo row (geometry verification) */\n.moon-phases-row {\n  display: grid;\n  grid-template-columns: repeat(8, 1fr);\n  gap: 6px;\n  align-items: start;\n  margin-top: 2px;\n}\n.mp-cell {\n  display: flex; flex-direction: column; align-items: center;\n  gap: 8px;\n  font-size: 9.5px;\n  color: rgba(255,255,255,0.55);\n  letter-spacing: 0.1px;\n  text-align: center;\n  line-height: 1.25;\n}\n.mp-cell .mp-disc {\n  width: 34px; height: 34px;\n  filter: drop-shadow(0 0 6px rgba(180,200,255,0.25));\n}\n.mp-cell .mp-disc svg { width: 100%; height: 100%; display: block; }\n\n/* moon controls in tweaks panel (slider + state label + debug toggle) */\n.tp-moon { padding-bottom: 4px; }\n.tp-moon-state {\n  font-size: 13px;\n  color: rgba(255,255,255,0.92);\n  margin: 6px 0 10px;\n  font-weight: 500;\n}\n.tp-moon-state strong {\n  color: var(--gold);\n  font-weight: 700;\n  margin-right: 4px;\n}\ninput[type=\"range\"].tp-slider {\n  width: 100%; -webkit-appearance: none; appearance: none;\n  height: 5px; border-radius: 99px;\n  background: linear-gradient(90deg, rgba(40,46,90,0.85), rgba(180,180,210,0.9) 50%, rgba(40,46,90,0.85));\n  outline: none; margin: 4px 0 2px;\n  border: 1px solid rgba(255,255,255,0.08);\n}\ninput[type=\"range\"].tp-slider::-webkit-slider-thumb {\n  -webkit-appearance: none; appearance: none;\n  width: 16px; height: 16px; border-radius: 50%;\n  background: #fff; border: 2px solid rgba(0,0,0,0.4);\n  box-shadow: 0 0 0 2px rgba(255,255,255,0.18), 0 4px 10px rgba(0,0,0,0.5);\n  cursor: pointer;\n}\ninput[type=\"range\"].tp-slider::-moz-range-thumb {\n  width: 16px; height: 16px; border-radius: 50%; background: #fff;\n  border: 2px solid rgba(0,0,0,0.4);\n  box-shadow: 0 0 0 2px rgba(255,255,255,0.18), 0 4px 10px rgba(0,0,0,0.5); cursor: pointer;\n}\n.tp-moon-scale {\n  display: flex; justify-content: space-between;\n  font-size: 9.5px; color: rgba(255,255,255,0.4);\n  letter-spacing: 0.5px;\n  padding: 2px 1px 0;\n  font-variant-numeric: tabular-nums;\n}\n\n.tp-toggle-row {\n  margin-top: 12px;\n  display: flex; align-items: center; gap: 10px;\n  width: 100%;\n  background: rgba(255,255,255,0.04);\n  border: 1px solid rgba(255,255,255,0.08);\n  border-radius: 12px;\n  padding: 9px 12px;\n  font-family: inherit; font-size: 12.5px; font-weight: 500;\n  color: rgba(255,255,255,0.85);\n  cursor: pointer;\n  transition: background .15s ease, border-color .15s ease;\n}\n.tp-toggle-row:hover { background: rgba(255,255,255,0.07); }\n.tp-toggle-row .sw {\n  width: 32px; height: 19px; border-radius: 99px; position: relative;\n  background: rgba(255,255,255,0.10);\n  border: 1px solid rgba(255,255,255,0.10);\n  flex-shrink: 0;\n  transition: background .2s ease;\n}\n.tp-toggle-row .sw::after {\n  content: \"\"; position: absolute; top: 2px; left: 2px;\n  width: 13px; height: 13px; border-radius: 50%; background: #fff;\n  transition: transform .2s ease;\n  box-shadow: 0 2px 5px rgba(0,0,0,0.5);\n}\n.tp-toggle-row.is-on .sw {\n  background: linear-gradient(135deg, #F07A2A, #E05A10);\n  border-color: rgba(255,170,90,0.6);\n}\n.tp-toggle-row.is-on .sw::after { transform: translateX(13px); }\n/* 5 options is tight — shrink labels */\n.tp-segments[data-key=\"moon\"] .opt { padding: 6px 2px; font-size: 10.5px; }\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- mock surrounding chrome — just enough context, not a full screen -->\n<div class=\"page-shell\">\n  <div>\n    <div class=\"page-title\">Молитвы и зманим<\u002Fdiv>\n    <div class=\"page-sub\">3 Сиван 5786 · 19 мая 2026 · <span class=\"city\">Москва ▾<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- =======================================================\n       DAY SCALE CARD\n       ======================================================= -->\n  <div class=\"glass-card dayscale\">\n    <!-- /* scene-layers: dawn/day/sunset/night crossfade */ -->\n    <div class=\"scenes\" id=\"scenes\">\n      <div class=\"scene scene-dawn\" data-scene=\"dawn\">\n        <div class=\"layer base\"><\u002Fdiv>\n        <div class=\"layer haze\"><\u002Fdiv>\n        <div class=\"blob b1\"><\u002Fdiv>\n        <div class=\"blob b2\"><\u002Fdiv>\n        <div class=\"sun-rise\"><\u002Fdiv>\n        <div class=\"embers\" id=\"embers\"><\u002Fdiv>\n        <div class=\"layer horizon-glow\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"scene scene-day\" data-scene=\"day\">\n        <div class=\"layer base\"><\u002Fdiv>\n        <div class=\"layer cloud\"><\u002Fdiv>\n        <div class=\"layer cloud2\"><\u002Fdiv>\n        <div class=\"layer cloud3\"><\u002Fdiv>\n        <div class=\"layer ray\"><\u002Fdiv>\n        <div class=\"layer ray2\"><\u002Fdiv>\n        <div class=\"blob sun\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"scene scene-sunset\" data-scene=\"sunset\">\n        <div class=\"layer base\"><\u002Fdiv>\n        <div class=\"blob b1\"><\u002Fdiv>\n        <div class=\"blob b2\"><\u002Fdiv>\n        <div class=\"streak s1\"><\u002Fdiv>\n        <div class=\"streak s2\"><\u002Fdiv>\n        <div class=\"streak s3\"><\u002Fdiv>\n        <div class=\"sun-set\"><\u002Fdiv>\n        <div class=\"layer flare\"><\u002Fdiv>\n        <div class=\"layer glow\"><\u002Fdiv>\n        <div class=\"layer horizon\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"scene scene-night\" data-scene=\"night\">\n        <div class=\"layer base\"><\u002Fdiv>\n        <div class=\"layer aurora\"><\u002Fdiv>\n        <div class=\"stars\" id=\"stars\"><\u002Fdiv>\n        <div class=\"shooter\"><\u002Fdiv>\n        <div class=\"shooter s2\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"scene-vignette\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- /* moon stage — always rendered, opacity controlled per scene */ -->\n    <div class=\"moon-stage\" id=\"moonStage\">\n      <svg class=\"moon-path-svg\" id=\"moonPathSvg\" viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\">\n        <path id=\"moonPathArc\" fill=\"none\" stroke=\"rgba(255,255,255,0.40)\" stroke-width=\"0.6\" stroke-dasharray=\"1.2 1.8\" vector-effect=\"non-scaling-stroke\"><\u002Fpath>\n      <\u002Fsvg>\n      <div class=\"path-markers\" id=\"pathMarkers\"><\u002Fdiv>\n      <div class=\"moon\" id=\"mainMoon\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- /* card content sits above scenes */ -->\n    <div class=\"ds-inner ds-stage\">\n      <div class=\"ds-eyebrow\">\n        <span class=\"dot\"><\u002Fspan>\n        <span>ШКАЛА ДНЯ<\u002Fspan>\n        <span class=\"period-label\" id=\"periodLabel\">День<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- /* the scale itself: segments + marker */ -->\n      <div class=\"scale-wrap\">\n        <div class=\"scale-rail\" id=\"rail\">\n          <!-- segments injected by JS -->\n        <\u002Fdiv>\n        <div class=\"marker\" id=\"marker\" style=\"left: 50%\">\n          <div class=\"pill\" id=\"markerPill\">06:19<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- /* zmanim labels */ -->\n      <div class=\"zmanim\">\n        <div class=\"zm\"><div class=\"t\">04:12<\u002Fdiv><div class=\"l\">Восход<\u002Fdiv><\u002Fdiv>\n        <div class=\"zm\"><div class=\"t\">12:18<\u002Fdiv><div class=\"l\">Полдень<\u002Fdiv><\u002Fdiv>\n        <div class=\"zm\"><div class=\"t\">20:31<\u002Fdiv><div class=\"l\">Закат<\u002Fdiv><\u002Fdiv>\n        <div class=\"zm\"><div class=\"t\">21:09<\u002Fdiv><div class=\"l\">Ночь<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ds-link\">\n        ВСЕ ЗМАНИМ\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M9 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- =======================================================\n       CONTROLLERS\n       ======================================================= -->\n  <div class=\"glass-card controls\">\n    <div class=\"row\">\n      <div class=\"period-btns\" id=\"periodBtns\">\n        <button class=\"period-btn\" data-p=\"dawn\"><span class=\"sw\"><\u002Fspan>Рассвет<\u002Fbutton>\n        <button class=\"period-btn\" data-p=\"day\"><span class=\"sw\"><\u002Fspan>День<\u002Fbutton>\n        <button class=\"period-btn\" data-p=\"sunset\"><span class=\"sw\"><\u002Fspan>Закат<\u002Fbutton>\n        <button class=\"period-btn\" data-p=\"night\"><span class=\"sw\"><\u002Fspan>Ночь<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div class=\"row between\" style=\"margin-bottom: 6px;\">\n        <span class=\"label-tiny\">Время дня<\u002Fspan>\n        <span class=\"label-tiny\" id=\"currentPeriodTxt\" style=\"color: var(--gold);\">DAY<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"slider-row\">\n        <span class=\"time\" id=\"timeText\">06:19<\u002Fspan>\n        <input type=\"range\" min=\"0\" max=\"1440\" step=\"1\" value=\"379\" class=\"time-slider\" id=\"timeSlider\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"row between\">\n      <div class=\"toggle\" id=\"autoToggle\">\n        <span class=\"sw\"><\u002Fspan>\n        <span>Auto transition<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"play-btn\" id=\"playBtn\">\n        <svg viewBox=\"0 0 24 24\" fill=\"currentColor\" id=\"playIcon\"><path d=\"M8 5v14l11-7z\"><\u002Fpath><\u002Fsvg>\n        <span id=\"playTxt\">Play demo<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- =======================================================\n       MOON PHASES — geometry verification row\n       ======================================================= -->\n  <div class=\"glass-card\" style=\"padding: 16px;\">\n    <div class=\"ds-eyebrow\" style=\"margin-bottom: 14px;\">\n      <span class=\"dot\"><\u002Fspan>\n      <span>ФАЗЫ ЛУНЫ — ГЕОМЕТРИЯ<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"moon-phases-row\" id=\"moonPhasesRow\"><!-- built by JS --><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- =======================================================\n       IMPLEMENTATION NOTES FOR REACT NATIVE\n       ======================================================= -->\n  <div class=\"glass-card notes\">\n    <h3>Implementation notes for React Native<\u002Fh3>\n\n    <h4>Слои → PrayerDayScaleBackground<\u002Fh4>\n    <ul>\n      <li>Каждая сцена (<code>dawn<\u002Fcode> / <code>day<\u002Fcode> / <code>sunset<\u002Fcode> / <code>night<\u002Fcode>) — отдельный <code>Animated.View<\u002Fcode> с opacity 0/1; crossfade через <code>Animated.timing<\u002Fcode> с <code>useNativeDriver: true<\u002Fcode> и duration <code>XFADE = 1100ms<\u002Fcode>.<\u002Fli>\n      <li>Базовые градиенты переносятся на <code>expo-linear-gradient<\u002Fcode> (<code>LinearGradient<\u002Fcode>) + <code>react-native-svg<\u002Fcode> <code>RadialGradient<\u002Fcode> для пятен. Если избегать SVG — заменить radial-пятна на масштабируемые <code>Image<\u002Fcode> с PNG-радиальным альфа-маском.<\u002Fli>\n      <li>Звёзды — массив объектов с пред-вычисленными x/y/delay (без рандома при ререндере). Мерцание — <code>Animated.loop(Animated.sequence([fadeIn, fadeOut]))<\u002Fcode> с разными <code>delay<\u002Fcode>.<\u002Fli>\n    <\u002Ful>\n\n    <h4>Анимации → Animated API<\u002Fh4>\n    <ul>\n      <li>«Дыхание» световых пятен (<code>dawnBreathe<\u002Fcode>, <code>sunBreathe<\u002Fcode>, <code>auroraBreathe<\u002Fcode>) — <code>Animated.loop<\u002Fcode> по <code>scale<\u002Fcode>/<code>translateY<\u002Fcode>/<code>opacity<\u002Fcode>, native driver.<\u002Fli>\n      <li>Дрейф облаков и лучей (<code>cloudDrift<\u002Fcode>, <code>rayDrift<\u002Fcode>) — линейный <code>translateX<\u002Fcode> в <code>Animated.loop<\u002Fcode>, длинный duration (24–38s).<\u002Fli>\n      <li>Горизонт-шиммер на закате — лёгкая пульсация opacity 0.8↔1, тот же приём.<\u002Fli>\n      <li>Маркер времени (<code>left<\u002Fcode>) — <code>Animated.timing(left, …)<\u002Fcode> 350ms <code>easeInOut<\u002Fcode>. В RN лучше через <code>transform: translateX<\u002Fcode>, чтобы остаться на native driver.<\u002Fli>\n    <\u002Ful>\n\n    <h4>Что оставить только в вебе<\u002Fh4>\n    <ul>\n      <li><code>backdrop-filter<\u002Fcode> — в RN заменить на <code>expo-blur<\u002Fcode> (<code>BlurView<\u002Fcode>) над фоном.<\u002Fli>\n      <li><code>mix-blend-mode: screen<\u002Fcode> для солнечных лучей — в RN заменить либо на просто прозрачный белый слой, либо на <code>@shopify/react-native-skia<\u002Fcode> (<code>BlendMode.Screen<\u002Fcode>).<\u002Fli>\n      <li>CSS <code>filter: blur(...)<\u002Fcode> на blob-ах — переносить через PNG с предварительно «зашитым» blur, либо <code>Skia<\u002Fcode> <code>BlurMask<\u002Fcode>.<\u002Fli>\n    <\u002Ful>\n\n    <h4>Tokens (вынести в theme)<\u002Fh4>\n    <ul>\n      <li><code>PERIOD_COLORS<\u002Fcode>: палитры на dawn/day/sunset/night (по 3–4 цвета для каждого <code>LinearGradient<\u002Fcode>).<\u002Fli>\n      <li><code>SEGMENT_COLORS<\u002Fcode>: shacharit / mincha / maariv / night / break.<\u002Fli>\n      <li><code>TIMINGS<\u002Fcode>: <code>XFADE = 1100<\u002Fcode>, <code>BREATHE = 6500<\u002Fcode>, <code>DRIFT = 28000<\u002Fcode>, <code>TWINKLE = 3200<\u002Fcode>, <code>MARKER = 350<\u002Fcode>.<\u002Fli>\n      <li><code>PERIOD_BOUNDARIES<\u002Fcode> (минуты от полуночи): dawn = [alot, sunrise+60], day = [sunrise+60, sunset-60], sunset = [sunset-60, tzeit+45], night = rest.<\u002Fli>\n    <\u002Ful>\n\n    <h4>Структура карточки<\u002Fh4>\n    <ul>\n      <li><code>&lt;PrayerDayScaleBackground period /&gt;<\u002Fcode> — абсолютный слой с 4 сценами и crossfade.<\u002Fli>\n      <li><code>&lt;PrayerDayScale time={now} zmanim={…} /&gt;<\u002Fcode> — сегменты + маркер + лейблы зманим.<\u002Fli>\n      <li>Оба собираются в карточке <code>&lt;DayScaleCard /&gt;<\u002Fcode>, заменяющей текущую в экране «Молитвы». Остальной экран не трогаем.<\u002Fli>\n    <\u002Ful>\n\n    <h4>Moon phase → отдельные файлы<\u002Fh4>\n    <ul>\n      <li><code>src/lib/moonPhase.ts<\u002Fcode> — чистая функция <code>getMoonVisualState(hebrewDay: number): MoonVisualState<\u002Fcode>. Возвращает\n        <code>{ phase, phaseProgress, xPercent, yPercent, opacity, glow, scale, labelRu }<\u002Fcode>.\n        <code>phase<\u002Fcode> — числовое 0…1 для рендера формы (0=новая, 0.25=FQ, 0.5=полная, 0.75=LQ).\n        <code>labelRu<\u002Fcode> — русское название фазы; день 1 даёт <code>'Рош Ходеш · Новолуние'<\u002Fcode>.\n        Без zmanim-расчётов, только маппинг по дню.<\u002Fli>\n      <li><code>src/components/prayer/MoonPhase.tsx<\u002Fcode> — рендер: <code>&lt;Svg viewBox=\"0 0 100 100\"&gt;<\u002Fcode>\n        с <code>&lt;Circle&gt;<\u002Fcode> (lit) и <code>&lt;Path d=…&gt;<\u002Fcode> (shadow). Путь тени строится той же функцией\n        что в прототипе: четверти → прямая линия (<code>L 50,0<\u002Fcode>), серп/горбатая → пол-эллипс с <code>rx=|b|<\u002Fcode>,\n        sweep-flag по знаку <code>b<\u002Fcode>. Положение, прозрачность и glow — пропами из <code>getMoonVisualState<\u002Fcode>;\n        мягкая интерполяция через <code>Animated.Value<\u002Fcode> при смене дня.<\u002Fli>\n      <li><code>src/components/prayer/PrayerDayScaleBackground.tsx<\u002Fcode> — оборачивает 4 сцены и кладёт\n        <code>&lt;MoonPhase hebrewDay /&gt;<\u002Fcode> поверх; <code>opacity<\u002Fcode> луны умножается на\n        <code>{night: 1, sunset: 0.4, dawn/day: 0}[period]<\u002Fcode> с <code>Animated.timing<\u002Fcode> на 800–900 ms.<\u002Fli>\n      <li>Path-debug режим оставить только в дев-сборке (флаг <code>__DEV__<\u002Fcode>): рисует пунктирную дугу\n        и точки дней 1/7/15/22/30 поверх карточки.<\u002Fli>\n    <\u002Ful>\n\n    <h3 style=\"margin-top:18px\">Checklist ручной проверки<\u002Fh3>\n    <ul class=\"checklist\">\n      <li>Открыть <code>docs/prototype/prayer-day-scale-animated.html<\u002Fcode> двойным кликом.<\u002Fli>\n      <li>Кнопки «Рассвет / День / Закат / Ночь» меняют фон с crossfade ≈1 сек.<\u002Fli>\n      <li>Slider 0–24 ч двигает маркер; активный сегмент получает halo.<\u002Fli>\n      <li>«Auto transition» — фон следует за временем слайдера.<\u002Fli>\n      <li>«Play demo» — последовательно проходит dawn → day → sunset → night.<\u002Fli>\n      <li>Текст шкалы и зманим читаются на всех 4 фонах.<\u002Fli>\n      <li>Стиль совместим с тёмным glassmorphism текущего экрана.<\u002Fli>\n      <li>Файл работает офлайн, без интернета и внешних зависимостей.<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- floating tweaks UI -->\n<button class=\"tweaks-fab\" id=\"tweaksFab\" aria-label=\"Open tweaks\">\n  <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n    <circle cx=\"8\" cy=\"7\" r=\"2.2\"><\u002Fcircle><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"4.8\"><\u002Fline><line x1=\"8\" y1=\"9.2\" x2=\"8\" y2=\"22\"><\u002Fline>\n    <circle cx=\"16\" cy=\"16\" r=\"2.2\"><\u002Fcircle><line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"13.8\"><\u002Fline><line x1=\"16\" y1=\"18.2\" x2=\"16\" y2=\"22\"><\u002Fline>\n  <\u002Fsvg>\n<\u002Fbutton>\n<aside class=\"tweaks-panel\" id=\"tweaksPanel\" role=\"dialog\" aria-label=\"Tweaks\">\n  <div class=\"tp-header\">\n    <span class=\"tp-title\">TWEAKS<\u002Fspan>\n    <button class=\"tp-close\" id=\"tweaksClose\" aria-label=\"Close\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <!-- sections injected by JS -->\n<\u002Faside>\n\n<script>\n/* =========================================================================\n   JS · scale + scenes + controls\n   ========================================================================= */\n\n/* ---- period config (mirror of RN side) ---- */\n// Mock zmanim (minutes from midnight)\nconst ZM = {\n  alot:    192,  // 03:12\n  sunrise: 252,  // 04:12\n  midday:  738,  // 12:18\n  sunset: 1231,  // 20:31\n  tzeit:  1269,  // 21:09\n};\n\n// /* PERIOD CONFIG — copy this object to RN */\nconst PERIODS = {\n  dawn:   { label: 'Рассвет', range: [ZM.alot,         ZM.sunrise + 60] },\n  day:    { label: 'День',    range: [ZM.sunrise + 60, ZM.sunset  - 60] },\n  sunset: { label: 'Закат',   range: [ZM.sunset  - 60, ZM.tzeit   + 45] },\n  night:  { label: 'Ночь',    range: null /* everything else */ },\n};\n\nfunction periodForMinutes(m) {\n  if (m >= PERIODS.dawn.range[0]   && m <  PERIODS.dawn.range[1])   return 'dawn';\n  if (m >= PERIODS.day.range[0]    && m <  PERIODS.day.range[1])    return 'day';\n  if (m >= PERIODS.sunset.range[0] && m <  PERIODS.sunset.range[1]) return 'sunset';\n  return 'night';\n}\n\n/* ---- scale layout (visible window 03:00 → 23:59, see :SCALE_WINDOW) ---- */\nconst SCALE_START_MIN = 3  * 60;\nconst SCALE_END_MIN   = 24 * 60 - 1;\nconst SCALE_SPAN_MIN  = SCALE_END_MIN - SCALE_START_MIN;\n\n// Mock segment boundaries (in minutes from midnight)\nconst SEGMENTS = [\n  { id: 'night',    name: 'Ночь',     from: SCALE_START_MIN, to: ZM.sunrise,       cls: 'night',     showLabel: false },\n  { id: 'shacharit',name: 'Шахарит',  from: ZM.sunrise,      to: 9*60 + 41,        cls: 'shacharit', showLabel: true  },\n  { id: 'brk1',     name: '',         from: 9*60 + 41,       to: 13*60 + 7,        cls: 'brk',       showLabel: false },\n  { id: 'mincha',   name: 'Минха',    from: 13*60 + 7,       to: ZM.sunset,        cls: 'mincha',    showLabel: true  },\n  { id: 'brk2',     name: '',         from: ZM.sunset,       to: ZM.tzeit,         cls: 'brk',       showLabel: false },\n  { id: 'maariv',   name: 'Маарив',   from: ZM.tzeit,        to: 23*60 + 30,       cls: 'maariv',    showLabel: true  },\n  { id: 'night2',   name: '',         from: 23*60 + 30,      to: SCALE_END_MIN,    cls: 'night',     showLabel: false },\n];\n\n/* ---- build segments into rail ---- */\nconst rail = document.getElementById('rail');\nSEGMENTS.forEach(s => {\n  const el = document.createElement('div');\n  el.className = `seg ${s.cls}`;\n  el.dataset.segId = s.id;\n  const width = (s.to - s.from) / SCALE_SPAN_MIN * 100;\n  el.style.flex = `0 0 ${width}%`;\n  if (s.showLabel) el.innerHTML = `<span class=\"label\">${s.name}<\u002Fspan>`;\n  rail.appendChild(el);\n});\n\n/* ---- build stars (deterministic positions) ---- */\nconst stars = document.getElementById('stars');\n// pseudo-random but stable\nlet seed = 7;\nconst rand = () => (seed = (seed * 9301 + 49297) % 233280) / 233280;\nfor (let i = 0; i < 55; i++) {\n  const s = document.createElement('div');\n  s.className = 'star';\n  if (i % 3 === 0) s.classList.add('tw');\n  if (i % 11 === 0) s.classList.add('big');\n  s.style.left = (rand() * 100) + '%';\n  s.style.top  = (rand() * 78)  + '%';\n  s.style.animationDelay = (rand() * 4) + 's';\n  s.style.opacity = 0.5 + rand() * 0.5;\n  stars.appendChild(s);\n}\n\n/* ---- build dawn embers (deterministic) ---- */\nconst embers = document.getElementById('embers');\nfor (let i = 0; i < 14; i++) {\n  const e = document.createElement('div');\n  e.className = 'ember';\n  e.style.left = (5 + rand() * 90) + '%';\n  e.style.animationDelay  = (-rand() * 9) + 's';\n  e.style.animationDuration = (7 + rand() * 5) + 's';\n  e.style.setProperty('--dx', ((rand() - 0.5) * 60) + 'px');\n  e.style.width = e.style.height = (2 + Math.floor(rand() * 3)) + 'px';\n  embers.appendChild(e);\n}\n\n/* ---- state ---- */\nconst state = {\n  minutes: 6 * 60 + 19,   // 06:19 (matches current screenshot)\n  period:  'dawn',\n  autoTransition: true,\n  demoPlaying: false,\n  manualPeriod: null,     // if user clicked a button while auto is off\n};\n\n/* ---- elements ---- */\nconst $marker      = document.getElementById('marker');\nconst $markerPill  = document.getElementById('markerPill');\nconst $timeText    = document.getElementById('timeText');\nconst $timeSlider  = document.getElementById('timeSlider');\nconst $periodLabel = document.getElementById('periodLabel');\nconst $currentPeriodTxt = document.getElementById('currentPeriodTxt');\nconst $periodBtns  = document.getElementById('periodBtns');\nconst $autoToggle  = document.getElementById('autoToggle');\nconst $playBtn     = document.getElementById('playBtn');\nconst $playTxt     = document.getElementById('playTxt');\nconst $playIcon    = document.getElementById('playIcon');\nconst $scenes      = document.getElementById('scenes');\n\n/* ---- render helpers ---- */\nfunction fmtTime(min) {\n  const h = Math.floor(min / 60), m = min % 60;\n  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');\n}\n\nfunction setActiveScene(p) {\n  $scenes.querySelectorAll('.scene').forEach(el => {\n    el.classList.toggle('is-active', el.dataset.scene === p);\n  });\n  $periodLabel.textContent = PERIODS[p].label;\n  $currentPeriodTxt.textContent = p.toUpperCase();\n\n  // moon-stage visibility per period (night full, sunset soft, day/dawn hidden)\n  const $moonStage = document.getElementById('moonStage');\n  if ($moonStage) {\n    $moonStage.classList.remove('is-dawn','is-day','is-sunset','is-night');\n    $moonStage.classList.add('is-' + p);\n  }\n\n  // period buttons highlight\n  $periodBtns.querySelectorAll('.period-btn').forEach(b => {\n    b.classList.toggle('is-active', b.dataset.p === p);\n  });\n}\n\nfunction setActiveSegment(min) {\n  const segs = rail.querySelectorAll('.seg');\n  segs.forEach((el) => {\n    const seg = SEGMENTS.find(s => s.id === el.dataset.segId);\n    const isActive = min >= seg.from && min < seg.to && seg.cls !== 'brk';\n    el.classList.toggle('is-active', isActive);\n  });\n}\n\nfunction clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }\n\nfunction setMarkerByMinutes(min) {\n  // place marker only within visible scale window\n  const vis = clamp(min, SCALE_START_MIN, SCALE_END_MIN);\n  const pct = (vis - SCALE_START_MIN) / SCALE_SPAN_MIN * 100;\n  $marker.style.left = pct + '%';\n  $markerPill.textContent = fmtTime(min);\n  $timeText.textContent   = fmtTime(min);\n}\n\nfunction render() {\n  setMarkerByMinutes(state.minutes);\n  setActiveSegment(state.minutes);\n\n  const effectivePeriod = state.autoTransition\n    ? periodForMinutes(state.minutes)\n    : (state.manualPeriod || periodForMinutes(state.minutes));\n  state.period = effectivePeriod;\n  setActiveScene(effectivePeriod);\n}\n\n/* ---- events ---- */\n$timeSlider.value = state.minutes;\n$timeSlider.addEventListener('input', e => {\n  state.minutes = +e.target.value;\n  // when user scrubs time we follow the period if auto is on\n  if (state.autoTransition) state.manualPeriod = null;\n  render();\n});\n\n$periodBtns.addEventListener('click', e => {\n  const btn = e.target.closest('.period-btn');\n  if (!btn) return;\n  const p = btn.dataset.p;\n  state.manualPeriod = p;\n  // when user picks a period explicitly we disable auto (UX choice)\n  state.autoTransition = false;\n  $autoToggle.classList.remove('is-on');\n  // also jump time to the middle of that period for nicer visual feedback\n  if (PERIODS[p].range) {\n    const [a, b] = PERIODS[p].range;\n    state.minutes = Math.round((a + b) / 2);\n  } else {\n    state.minutes = 23 * 60 + 30;\n  }\n  $timeSlider.value = state.minutes;\n  render();\n});\n\n$autoToggle.addEventListener('click', () => {\n  state.autoTransition = !state.autoTransition;\n  $autoToggle.classList.toggle('is-on', state.autoTransition);\n  if (state.autoTransition) state.manualPeriod = null;\n  render();\n});\n\n/* ---- play demo: dawn → day → sunset → night, looping ---- */\nlet demoTimer = null;\nconst DEMO_STEPS = ['dawn','day','sunset','night'];\nconst DEMO_STEP_MS = 2400; // includes crossfade + dwell\nfunction setDemo(on) {\n  state.demoPlaying = on;\n  $playBtn.classList.toggle('is-playing', on);\n  $playTxt.textContent = on ? 'Stop demo' : 'Play demo';\n  $playIcon.innerHTML = on\n    ? '<rect x=\"6\" y=\"5\" width=\"4\" height=\"14\" /><rect x=\"14\" y=\"5\" width=\"4\" height=\"14\" />'\n    : '<path d=\"M8 5v14l11-7z\"/>';\n\n  if (on) {\n    let i = 0;\n    const tick = () => {\n      const p = DEMO_STEPS[i % DEMO_STEPS.length];\n      state.manualPeriod = p;\n      state.autoTransition = false;\n      $autoToggle.classList.remove('is-on');\n      if (PERIODS[p].range) {\n        const [a, b] = PERIODS[p].range;\n        state.minutes = Math.round((a + b) / 2);\n      } else {\n        state.minutes = 23 * 60 + 30;\n      }\n      $timeSlider.value = state.minutes;\n      render();\n      i++;\n    };\n    tick();\n    demoTimer = setInterval(tick, DEMO_STEP_MS);\n  } else {\n    clearInterval(demoTimer); demoTimer = null;\n  }\n}\n$playBtn.addEventListener('click', () => setDemo(!state.demoPlaying));\n\n/* =========================================================================\n   TWEAKS — palette / atmosphere / marker\n   ========================================================================= */\n\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"palette\": \"classic\",\n  \"atmosphere\": \"cinematic\",\n  \"marker\": \"pill\",\n  \"hebrewDay\": 30,\n  \"showMoonPath\": false\n}/*EDITMODE-END*/;\n\nconst TWEAK_OPTIONS = {\n  palette:    ['classic', 'aurora', 'ember'],\n  atmosphere: ['calm', 'balanced', 'cinematic'],\n  marker:     ['pill', 'beam', 'chip'],\n};\nconst TWEAK_LABELS = {\n  palette:    { classic: 'Classic', aurora: 'Aurora', ember: 'Ember' },\n  atmosphere: { calm: 'Calm', balanced: 'Balanced', cinematic: 'Cinematic' },\n  marker:     { pill: 'Pill', beam: 'Beam', chip: 'Chip' },\n};\n\nconst tweaks = { ...TWEAK_DEFAULTS };\nconst $dayscale = document.querySelector('.dayscale');\n\nfunction applyTweaks() {\n  $dayscale.dataset.palette    = tweaks.palette;\n  $dayscale.dataset.atmosphere = tweaks.atmosphere;\n  $dayscale.dataset.marker     = tweaks.marker;\n  applyMoonDay(tweaks.hebrewDay);\n  $dayscale.classList.toggle('is-path-debug', !!tweaks.showMoonPath);\n  // reflect segmented panel UI\n  document.querySelectorAll('.tp-segments').forEach(group => {\n    const key = group.dataset.key;\n    group.querySelectorAll('.opt').forEach(opt => {\n      opt.classList.toggle('is-active', opt.dataset.v === tweaks[key]);\n    });\n  });\n  // reflect custom moon controls\n  const $daySlider = document.getElementById('moonDaySlider');\n  if ($daySlider && +$daySlider.value !== tweaks.hebrewDay) $daySlider.value = tweaks.hebrewDay;\n  const $pathToggle = document.getElementById('moonPathToggle');\n  if ($pathToggle) $pathToggle.classList.toggle('is-on', !!tweaks.showMoonPath);\n}\nfunction setTweak(key, val) {\n  tweaks[key] = val;\n  applyTweaks();\n  // persist (host rewrites the EDITMODE-BEGIN/END block on disk)\n  try {\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');\n  } catch (e) {}\n}\n\n/* ---- build panel ---- */\nfunction buildPanel() {\n  const $panel = document.getElementById('tweaksPanel');\n  const sections = [\n    { key: 'palette',    label: 'Palette',    hint: 'Перекрашивает все 4 сцены' },\n    { key: 'atmosphere', label: 'Atmosphere', hint: 'Темп и плотность анимаций' },\n    { key: 'marker',     label: 'Marker',     hint: 'Стиль текущего времени' },\n  ];\n  sections.forEach(s => {\n    const sec = document.createElement('div');\n    sec.className = 'tp-section';\n    sec.innerHTML = `<span class=\"tp-label\">${s.label}<\u002Fspan>` +\n      `<div class=\"tp-segments\" data-key=\"${s.key}\">` +\n      TWEAK_OPTIONS[s.key].map(v =>\n        `<button class=\"opt\" data-v=\"${v}\"><span class=\"sw\"><\u002Fspan>${TWEAK_LABELS[s.key][v]}<\u002Fbutton>`\n      ).join('') + `<\u002Fdiv>`;\n    $panel.appendChild(sec);\n  });\n\n  // custom Moon section: day slider + state label
